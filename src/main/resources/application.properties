# ========================
# SERVER
# ========================
server.port=${PORT:8082}

# ========================
# APP
# ========================
spring.application.name=resume-service

# ========================
# MONGODB
# ========================
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.auto-index-creation=true

# ========================
# JAVA 21 VIRTUAL THREADS
# ========================
spring.threads.virtual.enabled=true

# ========================
# EUREKA
# ========================
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ========================
# FEIGN
# ========================
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

#if ai-service down, use fallback class
spring.cloud.openfeign.circuitbreaker.enabled=true

# ========================
# CLOUDINARY
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

ai.groq.api-key=${GROQ_API_KEY}
ai.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
ai.groq.free.model=${GROQ_FREE_MODEL:llama-3.1-8b-instant}
ai.groq.pro.model=${GROQ_PRO_MODEL:llama-3.3-70b-versatile}

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# WEBSOCKET
# ========================
websocket.allowed-origins=${ALLOWED_ORIGINS}

# ?? JWT ??????????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=2592000000

# Rate limiting
rate.limit.requests-per-minute=20